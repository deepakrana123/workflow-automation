services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
  worker:
    build: .
    command: python -m app.workers.consumer
    env_file:
      - .env
    depends_on:
      - redis
  
  retry_worker:
    build: .
    command: python -m app.workers.retry_worker
    env_file:
      - .env
    depends_on:
      - redis
  
  reaper_worker:
    build: .
    command: python -m app.workers.reaper_worker
    env_file:
      - .env
    depends_on:
      - redis
  
  redis:
    image: redis:7
    ports :
      - "6379:6379"
      

  

