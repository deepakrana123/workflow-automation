name: Workflow Platform CI/CD

on:
  push:
    branches:
      - master
      - release/local-stable
      - feature/**
      - bugfix/**
      - hotfix/**
      - experiment/**

  pull_request:
    branches:
      - master
      - release/local-stable

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import Validation
        run: |
          python -c "import app.main"
          python -c "import app.workers.consumer"
          python -c "import app.workers.retry_worker"
          python -c "import app.workers.reaper_worker"
          python -c "import app.workflow.workflow_compiler_service"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_HOST: ${{secrets.REDIS_HOST}}
          GEMINI_API_KEY: ${{secrets.GEMINI_API_KEY}}

      - name: Build Docker Image
        run: |
          docker build -t workflow-platform .
      

      # - name: Validate Docker Image
      #   run: |
      #     docker run --rm workflow-platform python --version

      - name: Validate Docker Image
        run: |
          docker run --rm \
          -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \ workflow-platform python -c "import app.main"

  deploy-staging:
    if: github.ref == 'refs/heads/release/local-stable'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy Staging
        run: railway up
        env:
           RAILWAY_TOKEN: ${{secrets.RAILWAY_TOKEN}}
  
  deploy-production:
    if: github.ref == 'refs/heads/master'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy Staging
        run: railway up
        env:
          RAILWAY_TOKEN: ${{secrets.RAILWAY_TOKEN}}